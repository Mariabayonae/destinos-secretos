<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Postales</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="postcard-section">

  <img src="fotos/mesa.png" class="mesa-fondo">

 <div class="postcard-container">
  
<div class="postcard">

<div class="front">
<img src="fotos/cesky.png">
</div>

<div class="back">
   <img src="fotos/cesky-back.png">
  </div>

    </div>
      </div>

<div class="button-container active">
      <a href="#" class="start-button">Ver más</a>
    </div>

<!-- POSTAL 2 -->
<div class="postcard-container">

  <div class="postcard">

    
    <div class="front">
      <img src="fotos/chefchaouen-back.png">
    </div>

    <div class="back">
      <img src="fotos/chefchaouen.png">
    </div>

  </div>

</div>

<div class="button-container">
  <a href="javascript:void(0)" class="start-button">Ver más</a>
</div>

<script>
  const postals = document.querySelectorAll(".postcard-container");
let index = 0;

postals.forEach((postal) => {
  postal.addEventListener("click", () => {
    
    postals[index].classList.remove("active");

    index++;

    if (index >= postals.length) {
      index = 0;
    }

    postals[index].classList.add("active");
</script>

</body>
</html>
